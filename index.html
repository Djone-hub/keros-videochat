<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keros VideoChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .login-screen h1 { font-size: 2.5rem; color: #e94560; }
    .login-box {
      background: #16213e;
      padding: 40px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 320px;
    }
    .login-box input {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
    }
    .login-box button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #c73e54; }
    
    .room-screen { display: none; }
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #16213e;
    }
    .room-header h2 { color: #e94560; }
    .room-link {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .room-link input {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 14px;
      width: 300px;
    }
    .room-link button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
      cursor: pointer;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
    }
    
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }
    .video-container {
      position: relative;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-container.screen-share video { object-fit: contain; background: #0a0a0a; transform: none !important; }
    .video-container.screen-share { aspect-ratio: 16/9; }
    .video-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .video-controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .video-container:hover .video-controls { opacity: 1; }
    .video-controls button {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .control-panel, .chat-panel {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
    }
    .control-panel h3, .chat-panel h3 {
      margin-bottom: 15px;
      color: #e94560;
      font-size: 16px;
    }
    .control-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .control-btn:hover { background: #1a4a7a; }
    .control-btn.active { background: #e94560; }
    .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .chat-message {
      margin-bottom: 10px;
      padding: 8px;
      background: #16213e;
      border-radius: 6px;
    }
    .chat-message .sender { color: #e94560; font-weight: 600; font-size: 12px; }
    .chat-message .text { font-size: 14px; margin-top: 4px; }
    .chat-message .time { font-size: 11px; color: #888; margin-top: 4px; }
    .chat-input {
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
    }
    .chat-input button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
    }
    
    .user-list {
      margin-top: 10px;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #0f3460;
      border-radius: 6px;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .user-item::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
    }
    .remote-volume {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .remote-volume input[type="range"] {
      width: 60px;
      height: 4px;
      background: #1a4a7a;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    .remote-volume input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
    }
    /* Mic test styles */
    .mic-test {
      background: #0f3460;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
    }
    .mic-test h4 {
      color: #e94560;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .mic-visualizer {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
    }
    .mic-bar {
      width: 4px;
      background: #e94560;
      border-radius: 2px;
      transition: height 0.1s;
      min-height: 4px;
      max-height: 40px;
    }
    .mic-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .mic-controls button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }
    .mic-controls button:hover {
      background: #e94560;
    }
    .volume-slider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .volume-slider input[type="range"] {
      flex: 1;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .volume-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
    }
    .room-list {
      margin-top: 10px;
      max-height: 150px;
      overflow-y: auto;
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
    }
    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      margin-bottom: 5px;
      background: #16213e;
      border-radius: 6px;
      cursor: pointer;
    }
    .room-item:hover {
      background: #1a4a7a;
    }
    .room-item span {
      font-size: 14px;
    }
    .room-item .count {
      background: #e94560;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }
    .create-room-btn {
      background: #4ade80 !important;
      color: #000 !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-screen" id="loginScreen">
      <h1>🎥 Keros VideoChat</h1>
      <div class="login-box">
        <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
        
        <!-- Mic Test Section -->
        <div class="mic-test" id="micTest">
          <h4>🎤 Проверка микрофона</h4>
          <div class="mic-visualizer" id="micVisualizer">
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
            <div class="mic-bar" style="height: 4px;"></div>
          </div>
          <div class="mic-controls">
            <button onclick="testMicrophone()">🔊 Тест микрофона</button>
            <button onclick="stopMicTest()">⏹ Стоп</button>
          </div>
          <div class="volume-slider" id="micVolumeControl" style="display: none;">
            <span>🔈</span>
            <input type="range" id="micVolume" min="0" max="100" value="100" onchange="setMicVolume(this.value)">
            <span>🔊</span>
          </div>
        </div>

        <input type="text" id="roomId" placeholder="ID комнаты (или создайте новую)">
        <button onclick="createNewRoom()" class="create-room-btn">➕ Создать новую комнату</button>
        <button onclick="joinRoom()">Войти в комнату</button>
        
        <div class="room-list" id="roomList" style="display: none;">
          <h4 style="color: #888; font-size: 12px; margin-bottom: 8px;">🔥 Активные комнаты:</h4>
        </div>
      </div>
      <p style="color: #888; font-size: 14px;">Поделитесь ссылкой на комнату для приглашения</p>
    </div>
    
    <div class="room-screen" id="roomScreen">
      <div class="room-header">
        <h2>📹 Комната: <span id="displayRoomId"></span></h2>
        <div class="room-link">
          <input type="text" id="shareLink" readonly>
          <button onclick="copyLink()">Копировать</button>
          <button onclick="leaveRoom()" style="background: #e94560;">Выйти</button>
        </div>
      </div>
      
      <div class="main-grid">
        <div class="video-grid" id="videoGrid"></div>
        
        <div class="sidebar">
          <div class="control-panel">
            <h3>Управление</h3>
            <button class="control-btn" id="micBtn" onclick="toggleMic()">
              🎤 Микрофон (вкл)
            </button>
            <div class="volume-slider" id="localMicVolume" style="margin-bottom: 15px;">
              <span>🎤</span>
              <input type="range" min="0" max="100" value="100" onchange="setLocalMicVolume(this.value)">
              <span>🔊</span>
            </div>
            <button class="control-btn" id="camBtn" onclick="toggleCam()">
              📹 Камера (вкл)
            </button>
            <button class="control-btn" id="screenBtn" onclick="toggleScreen()">
              🖥️ Демонстрация экрана
            </button>
          </div>
          
          <div class="chat-panel">
            <h3>💬 Чат</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
              <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
              <button onclick="sendMessage()">➤</button>
            </div>
          </div>
          
          <div class="control-panel">
            <h3>👥 Участники (<span id="userCount">1</span>)</h3>
            <div class="user-list" id="userList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
