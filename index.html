<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keros VideoChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #36393f;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* Login Screen */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      background: #202225;
    }
    .login-screen h1 { font-size: 2.5rem; color: #5865f2; }
    .login-box {
      background: #2f3136;
      padding: 40px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .login-box input {
      padding: 12px 16px;
      border: 1px solid #202225;
      border-radius: 4px;
      background: #40444b;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .login-box input:focus { border-color: #5865f2; }
    .login-box button {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #4752c4; }
    .create-room-btn {
      background: #3ba55d !important;
    }
    .create-room-btn:hover { background: #2d7d46 !important; }
    
    /* Mic Test */
    .mic-test {
      background: #40444b;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
    }
    .mic-test h4 { color: #b9bbbe; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; }
    .mic-visualizer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 40px;
      margin-bottom: 10px;
    }
    .mic-bar {
      width: 4px;
      background: #5865f2;
      border-radius: 2px;
      transition: height 0.1s;
      min-height: 4px;
      max-height: 40px;
    }
    .mic-controls {
      display: flex;
      gap: 10px;
    }
    .mic-controls button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }
    .mic-controls button:hover { background: #4752c4; }
    
    /* Room Screen - Discord Layout */
    .room-screen { 
      display: none; 
      height: 100vh;
      flex-direction: column;
    }
    
    /* Top Header */
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #2f3136;
      border-bottom: 1px solid #202225;
      height: 48px;
    }
    .room-header h2 { 
      color: #fff; 
      font-size: 16px; 
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .room-header h2::before {
      content: '#';
      color: #72767d;
    }
    .room-link {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .room-link input {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #40444b;
      color: #b9bbbe;
      font-size: 13px;
      width: 250px;
    }
    .room-link button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .room-link button:last-child {
      background: #ed4245;
    }
    
    /* Main Layout */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Left Sidebar - Members */
    .left-sidebar {
      width: 240px;
      background: #2f3136;
      border-right: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .sidebar-header h3 {
      font-size: 12px;
      color: #96989d;
      text-transform: uppercase;
      font-weight: 600;
    }
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .user-item:hover {
      background: rgba(79,84,92,0.4);
    }
    .user-item.inactive {
      opacity: 0.5;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .user-avatar.inactive {
      background: #72767d;
    }
    .user-name {
      font-size: 14px;
      color: #fff;
    }
    .user-name.inactive {
      color: #72767d;
    }
    .user-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ba55d;
      margin-left: auto;
    }
    .user-status.inactive {
      background: #72767d;
    }
    
    /* Center - Video Grid */
    .center-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #36393f;
    }
    
    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
    }
    
    .video-container {
      position: relative;
      background: #202225;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .video-container.screen-share video {
      object-fit: contain;
      background: #000;
    }
    
    .video-container.screen-share {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }
    
    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .remote-volume {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .remote-volume input[type="range"] {
      width: 60px;
      height: 4px;
      background: #72767d;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    .remote-volume input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #5865f2;
      border-radius: 50%;
      cursor: pointer;
    }
    
    /* Right Sidebar - Chat */
    .right-sidebar {
      width: 340px;
      background: #36393f;
      border-left: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }
    
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .chat-header h3 {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .chat-message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    
    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .chat-content {
      flex: 1;
    }
    
    .chat-header-info {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    
    .chat-sender {
      font-weight: 600;
      color: #fff;
      font-size: 15px;
    }
    
    .chat-time {
      font-size: 12px;
      color: #72767d;
    }
    
    .chat-text {
      font-size: 14px;
      color: #dcddde;
      line-height: 1.4;
    }
    
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #202225;
    }
    
    .chat-input {
      display: flex;
      gap: 8px;
      background: #40444b;
      padding: 12px;
      border-radius: 8px;
    }
    
    .chat-input input {
      flex: 1;
      border: none;
      background: transparent;
      color: #dcddde;
      font-size: 14px;
      outline: none;
    }
    
    .chat-input input::placeholder { color: #72767d; }
    
    .chat-input button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    /* Bottom Control Bar */
    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: #202225;
      border-top: 1px solid #202225;
    }
    
    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: #40444b;
      color: #b9bbbe;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 64px;
    }
    
    .control-btn:hover {
      background: #4f545c;
      color: #fff;
    }
    
    .control-btn.active {
      background: #5865f2;
      color: #fff;
    }
    
    .control-btn.danger {
      background: #ed4245;
      color: #fff;
    }
    
    .control-btn.danger:hover {
      background: #c03537;
    }
    
    .control-btn .icon {
      font-size: 20px;
    }
    
    .control-btn .label {
      font-size: 11px;
      font-weight: 500;
    }
    
    /* Screen Share Modal */
    .screen-share-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 1200px;
      height: 70%;
      background: #2f3136;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 1000;
      flex-direction: column;
    }
    
    .screen-share-modal.active {
      display: flex;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    
    .modal-header h3 {
      color: #fff;
      font-size: 16px;
    }
    
    .close-modal {
      background: none;
      border: none;
      color: #b9bbbe;
      font-size: 20px;
      cursor: pointer;
    }
    
    .modal-content {
      flex: 1;
      padding: 16px;
      display: flex;
      gap: 16px;
    }
    
    .screen-share-video {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .screen-share-video video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .chat-overlay {
      width: 300px;
      background: #36393f;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }
    
    .overlay-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }
    
    .overlay-backdrop.active {
      display: block;
    }
    
    /* Settings Panel */
    .settings-panel {
      position: fixed;
      top: 48px;
      right: 0;
      width: 320px;
      height: calc(100vh - 48px - 60px);
      background: #2f3136;
      border-left: 1px solid #202225;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    
    .settings-header h3 {
      font-size: 16px;
      color: #fff;
    }
    
    .settings-header button {
      background: none;
      border: none;
      color: #b9bbbe;
      font-size: 18px;
      cursor: pointer;
    }
    
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .setting-item {
      margin-bottom: 20px;
    }
    
    .setting-item label {
      display: block;
      font-size: 12px;
      color: #b9bbbe;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .setting-item button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    
    .setting-item button:hover {
      background: #4752c4;
    }
    
    .remote-volume-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 8px;
      background: #40444b;
      border-radius: 4px;
    }
    
    .remote-volume-item span {
      font-size: 13px;
      color: #dcddde;
      flex: 1;
    }
    
    .remote-volume-item input[type="range"] {
      width: 100px;
    }
    
    #avatarPreview img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <h1>🎥 Keros VideoChat</h1>
    <div class="login-box">
      <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
      
      <!-- Mic Test Section -->
      <div class="mic-test" id="micTest">
        <h4>🎤 Проверка микрофона</h4>
        <div class="mic-visualizer" id="micVisualizer">
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
          <div class="mic-bar" style="height: 4px;"></div>
        </div>
        <div class="mic-controls">
          <button onclick="testMicrophone()">🔊 Тест</button>
          <button onclick="stopMicTest()">⏹ Стоп</button>
        </div>
      </div>

      <input type="text" id="roomId" placeholder="ID комнаты (или оставь пустым для новой)">
      <button onclick="createNewRoom()" class="create-room-btn">➕ Создать комнату</button>
      <button onclick="joinRoom()">🚀 Войти в комнату</button>
    </div>
  </div>
  
  <!-- Room Screen -->
  <div class="room-screen" id="roomScreen">
    <!-- Header -->
    <div class="room-header">
      <h2><span id="displayRoomId">general</span></h2>
      <div class="room-link">
        <input type="text" id="shareLink" readonly>
        <button onclick="copyLink()">📋 Копировать</button>
        <button onclick="toggleSettings()">⚙️ Настройки</button>
      </div>
    </div>
    
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display: none;">
      <div class="settings-header">
        <h3>⚙️ Настройки комнаты</h3>
        <button onclick="toggleSettings()">✕</button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label>🎤 Громкость микрофона</label>
          <div class="volume-slider">
            <span>🔈</span>
            <input type="range" id="micVolume" min="0" max="100" value="100" onchange="setMicVolume(this.value)">
            <span>🔊</span>
          </div>
        </div>
        <div class="setting-item">
          <label>🔊 Громкость собеседников</label>
          <div id="remoteVolumeControls">
            <p style="color: #72767d; font-size: 12px;">Подключитесь к комнате для управления громкостью участников</p>
          </div>
        </div>
        <div class="setting-item">
          <label>🖼️ Ваша аватарка</label>
          <input type="file" id="avatarUpload" accept="image/*" onchange="uploadAvatar(this)" style="display: none;">
          <button onclick="document.getElementById('avatarUpload').click()">📤 Загрузить аватар</button>
          <div id="avatarPreview" style="margin-top: 10px;"></div>
        </div>
      </div>
    </div>
    
    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left Sidebar - Active Members -->
      <div class="left-sidebar">
        <div class="sidebar-header">
          <h3>👥 Участники — <span id="userCount">1</span></h3>
        </div>
        <div class="user-list" id="activeUsers">
          <div class="user-item">
            <div class="user-avatar">Я</div>
            <span class="user-name">Вы</span>
            <div class="user-status"></div>
          </div>
        </div>
      </div>
      
      <!-- Center - Video Grid -->
      <div class="center-area">
        <div class="video-grid" id="videoGrid"></div>
      </div>
      
      <!-- Right Sidebar - Chat -->
      <div class="right-sidebar">
        <div class="chat-header">
          <h3>💬 Чат</h3>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Bottom Control Bar -->
    <div class="bottom-bar">
      <button class="control-btn" id="micBtn" onclick="toggleMic()">
        <span class="icon">🎤</span>
        <span class="label">Мик</span>
      </button>
      <button class="control-btn" id="camBtn" onclick="toggleCam()">
        <span class="icon">📹</span>
        <span class="label">Камера</span>
      </button>
      <button class="control-btn" id="screenBtn" onclick="toggleScreen()">
        <span class="icon">🖥️</span>
        <span class="label">Экран</span>
      </button>
      <button class="control-btn" id="callBtn" onclick="leaveRoom()">
        <span class="icon">📞</span>
        <span class="label">Выйти</span>
      </button>
    </div>
  </div>
  
  <!-- Screen Share Modal -->
  <div class="overlay-backdrop" id="screenBackdrop" onclick="closeScreenModal()"></div>
  <div class="screen-share-modal" id="screenShareModal">
    <div class="modal-header">
      <h3>🖥️ Демонстрация экрана</h3>
      <button class="close-modal" onclick="closeScreenModal()">✕</button>
    </div>
    <div class="modal-content">
      <div class="screen-share-video" id="modalVideoContainer"></div>
      <div class="chat-overlay" id="modalChat">
        <div class="chat-messages" id="modalChatMessages" style="flex: 1; overflow-y: auto; padding: 12px;"></div>
        <div class="chat-input-area" style="padding: 12px; border-top: 1px solid #202225;">
          <div class="chat-input">
            <input type="text" id="modalChatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendModalMessage()">
            <button onclick="sendModalMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
