<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keros VideoChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #36393f;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* Auth Screen */
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      background: #202225;
    }
    .auth-screen h1 { font-size: 2.5rem; color: #5865f2; }
    .auth-box {
      background: #2f3136;
      padding: 40px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: #40444b;
      color: #b9bbbe;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .auth-tab.active {
      background: #5865f2;
      color: #fff;
    }
    .auth-form { display: none; }
    .auth-form.active { display: flex; flex-direction: column; gap: 15px; }
    .auth-box input {
      padding: 12px 16px;
      border: 1px solid #202225;
      border-radius: 4px;
      background: #40444b;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .auth-box input:focus { border-color: #5865f2; }
    .auth-box button[type="submit"] {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-box button[type="submit"]:hover { background: #4752c4; }
    
    /* Lobby Screen */
    .lobby-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    .lobby-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #2f3136;
      border-bottom: 1px solid #202225;
    }
    .lobby-header h2 { 
      color: #fff; 
      font-size: 20px; 
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-info .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      overflow: hidden;
    }
    .user-info .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #ed4245;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    
    .lobby-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Room List Sidebar */
    .rooms-sidebar {
      width: 300px;
      background: #2f3136;
      border-right: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }
    .rooms-header {
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .rooms-header h3 {
      font-size: 12px;
      color: #96989d;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .create-room-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #3ba55d;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .create-room-btn:hover { background: #2d7d46; }
    .rooms-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .room-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 4px;
    }
    .room-item:hover { background: #40444b; }
    .room-item.active { background: #5865f2; }
    .room-item .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .room-item .info {
      flex: 1;
    }
    .room-item .name {
      font-size: 14px;
      color: #fff;
      font-weight: 500;
    }
    .room-item .count {
      font-size: 12px;
      color: #96989d;
    }
    
    /* Main Lobby Area */
    .lobby-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #36393f;
      padding: 24px;
    }
    .welcome-section {
      text-align: center;
      margin-bottom: 32px;
    }
    .welcome-section h3 {
      font-size: 24px;
      color: #fff;
      margin-bottom: 8px;
    }
    .welcome-section p {
      color: #96989d;
      font-size: 14px;
    }
    
    /* Create Room Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #2f3136;
      border-radius: 8px;
      padding: 24px;
      min-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .modal h3 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 16px;
    }
    .modal input {
      width: 100%;
      padding: 12px;
      border: 1px solid #202225;
      border-radius: 4px;
      background: #40444b;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .modal .cancel { background: #72767d; color: #fff; }
    .modal .create { background: #3ba55d; color: #fff; }
    
    /* Room Screen */
    .room-screen { 
      display: none; 
      height: 100vh;
      flex-direction: column;
    }
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #2f3136;
      border-bottom: 1px solid #202225;
      height: 48px;
    }
    .room-header h2 { 
      color: #fff; 
      font-size: 16px; 
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .room-header h2::before {
      content: '#';
      color: #72767d;
    }
    .room-header .actions {
      display: flex;
      gap: 10px;
    }
    .room-header button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .room-header button.leave { background: #ed4245; }
    .room-header button.disconnect { background: #faa81a; color: #000; }
    .room-header button.settings { background: #72767d; }
    
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Left Sidebar - Members */
    .left-sidebar {
      width: 240px;
      background: #2f3136;
      border-right: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .sidebar-header h3 {
      font-size: 12px;
      color: #96989d;
      text-transform: uppercase;
      font-weight: 600;
    }
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .user-item:hover { background: rgba(79,84,92,0.4); }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-name {
      font-size: 14px;
      color: #fff;
    }
    .user-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ba55d;
      margin-left: auto;
    }
    
    /* Center - Video Grid */
    .center-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #36393f;
    }
    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
    }
    .video-container {
      position: relative;
      background: #202225;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-container.screen-share video {
      object-fit: contain;
      background: #000;
    }
    .video-container.screen-share {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }
    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .remote-volume {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .remote-volume input[type="range"] {
      width: 60px;
      height: 4px;
      background: #72767d;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    .remote-volume input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #5865f2;
      border-radius: 50%;
      cursor: pointer;
    }
    
    /* Right Sidebar - Chat */
    .right-sidebar {
      width: 340px;
      background: #36393f;
      border-left: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .chat-header h3 {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .chat-content {
      flex: 1;
    }
    .chat-header-info {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .chat-sender {
      font-weight: 600;
      color: #fff;
      font-size: 15px;
    }
    .chat-time {
      font-size: 12px;
      color: #72767d;
    }
    .chat-text {
      font-size: 14px;
      color: #dcddde;
      line-height: 1.4;
    }
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #202225;
    }
    .chat-input {
      display: flex;
      gap: 8px;
      background: #40444b;
      padding: 12px;
      border-radius: 8px;
    }
    .chat-input input {
      flex: 1;
      border: none;
      background: transparent;
      color: #dcddde;
      font-size: 14px;
      outline: none;
    }
    .chat-input input::placeholder { color: #72767d; }
    .chat-input button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    /* Bottom Control Bar */
    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: #202225;
      border-top: 1px solid #202225;
    }
    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: #40444b;
      color: #b9bbbe;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 64px;
    }
    .control-btn:hover {
      background: #4f545c;
      color: #fff;
    }
    .control-btn.active {
      background: #5865f2;
      color: #fff;
    }
    .control-btn.danger {
      background: #ed4245;
      color: #fff;
    }
    .control-btn .icon { font-size: 20px; }
    .control-btn .label { font-size: 11px; font-weight: 500; }
    
    /* Settings Panel */
    .settings-panel {
      display: none;
      position: fixed;
      top: 48px;
      right: 0;
      width: 320px;
      height: calc(100vh - 48px - 60px);
      background: #2f3136;
      border-left: 1px solid #202225;
      z-index: 100;
      flex-direction: column;
    }
    .settings-panel.active { display: flex; }
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #202225;
    }
    .settings-header h3 {
      font-size: 16px;
      color: #fff;
    }
    .settings-header button {
      background: none;
      border: none;
      color: #b9bbbe;
      font-size: 18px;
      cursor: pointer;
    }
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .setting-item { margin-bottom: 20px; }
    .setting-item label {
      display: block;
      font-size: 12px;
      color: #b9bbbe;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .setting-item button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .volume-slider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .volume-slider input[type="range"] {
      flex: 1;
      height: 6px;
      background: #40444b;
      border-radius: 3px;
      -webkit-appearance: none;
      appearance: none;
    }
    .volume-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #5865f2;
      border-radius: 50%;
      cursor: pointer;
    }
    .remote-volume-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 8px;
      background: #40444b;
      border-radius: 4px;
    }
    .remote-volume-item span {
      font-size: 13px;
      color: #dcddde;
      flex: 1;
    }
    #avatarPreview img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div class="auth-screen" id="authScreen">
    <h1>🎥 Keros VideoChat</h1>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
        <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
      </div>
      
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="Никнейм" required maxlength="20">
        <input type="password" id="loginPassword" placeholder="Пароль" required>
        <button type="submit">🔐 Войти</button>
      </form>
      
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <input type="text" id="regUsername" placeholder="Никнейм" required maxlength="20">
        <input type="password" id="regPassword" placeholder="Пароль" required minlength="4">
        <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
        <button type="submit">📝 Зарегистрироваться</button>
      </form>
    </div>
  </div>
  
  <!-- Lobby Screen -->
  <div class="lobby-screen" id="lobbyScreen">
    <div class="lobby-header">
      <h2>🏠 Лобби Keros VideoChat</h2>
      <div class="user-info">
        <div class="avatar" id="lobbyAvatar">Я</div>
        <span id="lobbyUsername">Пользователь</span>
        <button onclick="logout()">Выйти</button>
      </div>
    </div>
    
    <div class="lobby-content">
      <div class="rooms-sidebar">
        <div class="rooms-header">
          <h3>💬 Комнаты</h3>
          <div class="search-box" style="margin-bottom: 12px;">
            <input type="text" id="roomSearch" placeholder="🔍 Поиск комнаты..." 
                   style="width: 100%; padding: 8px 12px; border: 1px solid #202225; border-radius: 4px; background: #40444b; color: #fff; font-size: 13px;"
                   oninput="searchRooms(this.value)">
          </div>
          <button class="create-room-btn" onclick="showCreateRoomModal()">➕ Создать комнату</button>
        </div>
        <div class="rooms-list" id="roomsList">
          <!-- Rooms will be added here -->
        </div>
      </div>
      
      <div class="lobby-main">
        <div class="welcome-section">
          <h3>Добро пожаловать в Keros VideoChat! 👋</h3>
          <p>Выберите комнату слева или создайте свою. Приглашайте друзей по ссылке!</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Create Room Modal -->
  <div class="modal-overlay" id="createRoomModal">
    <div class="modal">
      <h3>➕ Создать новую комнату</h3>
      <input type="text" id="newRoomName" placeholder="Название комнаты" maxlength="30">
      <div class="modal-buttons">
        <button class="cancel" onclick="hideCreateRoomModal()">Отмена</button>
        <button class="create" onclick="createRoom()">Создать</button>
      </div>
    </div>
  </div>
  
  <!-- Room Screen -->
  <div class="room-screen" id="roomScreen">
    <div class="room-header">
      <h2><span id="displayRoomId">general</span></h2>
      <div class="actions">
        <button onclick="copyLink()">📋 Ссылка</button>
        <button class="settings" onclick="toggleSettings()">⚙️</button>
        <button class="disconnect" onclick="disconnectAndJoinAnother()" title="Отключиться и выбрать другую комнату">🔌 Откл.</button>
        <button class="leave" onclick="leaveRoom()">🏠 Лобби</button>
      </div>
    </div>
    
    <div class="main-layout">
      <div class="left-sidebar">
        <div class="sidebar-header">
          <h3>👥 Участники — <span id="userCount">1</span></h3>
        </div>
        <div class="user-list" id="activeUsers"></div>
      </div>
      
      <div class="center-area">
        <div class="video-grid" id="videoGrid"></div>
      </div>
      
      <div class="right-sidebar">
        <div class="chat-header">
          <h3>💬 Чат</h3>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="bottom-bar">
      <button class="control-btn" id="micBtn" onclick="toggleMic()">
        <span class="icon">🎤</span>
        <span class="label">Мик</span>
      </button>
      <button class="control-btn" id="camBtn" onclick="toggleCam()">
        <span class="icon">📹</span>
        <span class="label">Камера</span>
      </button>
      <button class="control-btn" id="screenBtn" onclick="toggleScreen()">
        <span class="icon">🖥️</span>
        <span class="label">Экран</span>
      </button>
    </div>
  </div>
  
  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>⚙️ Настройки</h3>
      <button onclick="toggleSettings()">✕</button>
    </div>
    <div class="settings-content">
      <div class="setting-item">
        <label>🎤 Громкость микрофона</label>
        <div class="volume-slider">
          <span>🔈</span>
          <input type="range" id="micVolume" min="0" max="100" value="100" onchange="setMicVolume(this.value)">
          <span>🔊</span>
        </div>
      </div>
      <div class="setting-item">
        <label>🔊 Громкость собеседников</label>
        <div id="remoteVolumeControls">
          <p style="color: #72767d; font-size: 12px;">Нет других участников</p>
        </div>
      </div>
      <div class="setting-item">
        <label>🖼️ Ваша аватарка</label>
        <input type="file" id="avatarUpload" accept="image/*" onchange="uploadAvatar(this)" style="display: none;">
        <button onclick="document.getElementById('avatarUpload').click()">📤 Загрузить аватар</button>
        <div id="avatarPreview" style="margin-top: 10px;"></div>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
