<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="55"/>
    </clipPath>
  </defs>
  
  <!-- Круглый фон -->
  <circle cx="60" cy="60" r="55" fill="#0a192f" stroke="url(#logoGradient)" stroke-width="3"/>
  
  <!-- Анимированный контент -->
  <g clip-path="url(#circleClip)">
    <!-- Вращающийся круговой элемент - 3 ОБОРОТА В МИНУТУ -->
    <circle cx="60" cy="20" r="3" fill="#ffd700" opacity="0.8">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 60 60"
        to="360 60 60"
        dur="20s"
        repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="60" r="3" fill="#ff8c00" opacity="0.8">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 60 60"
        to="360 60 60"
        dur="20s"
        begin="5s"
        repeatCount="indefinite"/>
    </circle>
    
    <circle cx="60" cy="100" r="3" fill="#4fc3f7" opacity="0.8">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 60 60"
        to="360 60 60"
        dur="20s"
        begin="10s"
        repeatCount="indefinite"/>
    </circle>
    
    <circle cx="20" cy="60" r="3" fill="#ffd700" opacity="0.8">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 60 60"
        to="360 60 60"
        dur="20s"
        begin="15s"
        repeatCount="indefinite"/>
    </circle>
    
    <!-- Основной текст KEROS С МЕДЛЕННЫМ ВРАЩЕНИЕМ -->
    <g transform="translate(60,60)">
      <text x="0" y="-5" font-family="Arial Black, sans-serif" font-size="20" font-weight="bold" 
            fill="url(#logoGradient)" text-anchor="middle">
        KEROS
        <animateTransform
          attributeName="transform"
          attributeType="XML"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="60s"
          repeatCount="indefinite"/>
      </text>
      
      <!-- Подпись MODS С МЕДЛЕННЫМ ВРАЩЕНИЕМ -->
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" 
            fill="#4fc3f7" text-anchor="middle" opacity="0.9">
        MODS
        <animateTransform
          attributeName="transform"
          attributeType="XML"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="60s"
          repeatCount="indefinite"/>
      </text>
    </g>
  </g>
  
  <!-- Внешнее вращающееся кольцо -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"
          stroke-dasharray="5,5">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 60 60"
      to="360 60 60"
      dur="60s"
      repeatCount="indefinite"/>
  </circle>
</svg>
